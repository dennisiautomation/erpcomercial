version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - erp-network
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: erp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - erp-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: erp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: erp_comercial
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_password
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - erp-network

  redis:
    image: redis:alpine
    container_name: erp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
